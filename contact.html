<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Grand Horizon Hotel</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header class="header" id="header">
    <div class="logo">Grand Horizon Hotel</div>
    <nav class="nav" id="nav">
      <ul>
        <li><a href="index.html#home">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
      <button class="hamburger" id="hamburger" aria-label="Open menu"><i class="fa fa-bars"></i></button>
    </nav>
    <button class="mode-toggle" id="mode-toggle" aria-label="Toggle dark/light mode"><i class="fa fa-moon"></i></button>
  </header>
  <main>
    <h1>Contact Us</h1>
    <div class="contact-info">
      <p><i class="fa fa-phone"></i> +250795749677</p>
      <p><i class="fa fa-envelope"></i> musabwakagishaj@gmail.com</p>
      <p><i class="fa fa-location-dot"></i> City Center, Major City</p>
      <div class="social-links">
        <a href="#" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
        <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
        <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
      </div>
    </div>
    <form class="contact-form" id="contact-form">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
    <div class="map-container">
      <iframe src="https://www.openstreetmap.org/export/embed.html?bbox=..." style="border:0; width:100%; height:250px;" allowfullscreen="" loading="lazy" title="Hotel Location"></iframe>
    </div>
    <div class="faq">
      <h3>Frequently Asked Questions</h3>
      <div class="faq-list" id="faq-list">
        <!-- FAQ items injected by JS -->
      </div>
    </div>
  </main>
  <footer class="footer">
    <div class="footer-bottom">
      <span>&copy; 2026 Grand Horizon Hotel. All rights reserved.</span>
      <button class="back-to-top" id="back-to-top" aria-label="Back to top"><i class="fa fa-arrow-up"></i></button>
    </div>
  </footer>
  <script src="js/main.js"></script>
</body>
</html>
